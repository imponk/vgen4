<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Reels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    @font-face {
      font-family: 'DMSerifDisplay';
      src: url('fonts/DMSerifDisplay-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'PlusJakartaSans';
      src: url('fonts/PlusJakartaSans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      padding: 12px;
      display: flex;
      gap: 16px;
      background: #0f172a;
      color: #e5e7eb;
      font-family: 'PlusJakartaSans', system-ui, sans-serif;
    }

    .panel {
      background: #1e293b;
      padding: 16px 14px;
      border-radius: 14px;
      border: 1px solid #334155;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    .left { width: 380px; max-width: 100%; flex-shrink: 0; }
    .right { flex: 1; display: flex; justify-content: center; align-items: center; min-width: 0; }
    h2 { margin: 0 0 4px 0; font-size: 18px; }
    small { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 6px; }
    .field { margin-top: 10px; }
    label { font-size: 13px; display: block; margin-bottom: 4px; color: #cbd5e1; }

    textarea {
      width: 100%;
      min-height: 56px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      border: 1px solid #475569;
      padding: 9px 11px;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 1px rgba(59,130,246,0.5); }
    #body { min-height: 130px; }

    .btn-row { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.16s ease;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .btn-mp4 { background: linear-gradient(135deg, #ea580c, #dc2626); color: #fff; }
    .btn-mp4:hover { filter: brightness(1.05); }

    .status { margin-top: 8px; font-size: 12px; color: #94a3b8; }
    #download { margin-top: 8px; font-size: 13px; }
    #download a { display: block; margin-bottom: 6px; text-decoration: underline; }

    canvas {
      background: #00ff00;
      border-radius: 18px;
      border: 1px solid #475569;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      max-height: 92vh;
      max-width: 100%;
    }

    @media (max-width: 900px) {
      body { flex-direction: column; padding: 10px; }
      .left, .right { width: 100%; }
      .right { margin-top: 10px; }
    }
  </style>
</head>
<body>
  <div class="panel left">
    <h2>Reels <span style="font-size:10px;background:#059669;color:white;padding:2px 8px;border-radius:12px;margin-left:6px;">Green Screen</span></h2>
    <small>Background #00ff00 untuk Chroma Key</small>

    <div class="field">
      <label for="upper">Upper</label>
      <textarea id="upper" placeholder="Contoh: Breaking News"></textarea>
    </div>
    <div class="field">
      <label for="title">Judul</label>
      <textarea id="title" placeholder="Judul utama"></textarea>
    </div>
    <div class="field">
      <label for="subtitle">Subjudul</label>
      <textarea id="subtitle" placeholder="Subjudul"></textarea>
    </div>
    <div class="field">
      <label for="body">Isi</label>
      <textarea id="body" placeholder="Gunakan [[highlight]] untuk teks penting.

Pisah halaman dengan baris kosong."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" id="previewBtn">👁 Preview</button>
      <button class="btn-primary" id="renderBtn">🎬 WEBM</button>
      <button class="btn-mp4" id="renderMp4Btn">🎬 MP4</button>
    </div>
    <div class="status" id="status">Ready</div>
    <div id="download"></div>
  </div>

  <div class="panel right">
    <canvas id="canvas" width="1080" height="1920"></canvas>
  </div>

<script>
/* ============================================================
   SETUP - GREEN SCREEN #00ff00
   ============================================================ */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const ua = navigator.userAgent;
const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);

const LOGICAL_WIDTH = 1080;
const LOGICAL_HEIGHT = 1920;
const SCALE = isMobile ? 0.5 : 1.0;

canvas.width  = LOGICAL_WIDTH * SCALE;
canvas.height = LOGICAL_HEIGHT * SCALE;
ctx.scale(SCALE, SCALE);

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

const upperEl = document.getElementById('upper');
const titleEl = document.getElementById('title');
const subtitleEl = document.getElementById('subtitle');
const bodyEl = document.getElementById('body');
const previewBtn = document.getElementById('previewBtn');
const renderBtn = document.getElementById('renderBtn');
const renderMp4Btn = document.getElementById('renderMp4Btn');
const statusEl = document.getElementById('status');
const downloadEl = document.getElementById('download');

let animating = false, recording = false, mediaRecorder = null;
let recordedChunks = [], animStart = null, targetDuration = 12;
let bodyPages = [], pageDurations = [];
let titleLayout = { marginLeft: 110, marginRight: 140, textWidth: 830, upperLines: [], titleLines: [], subtitleLines: [] };
let titleCanvas = null, titleCtx = null, titleTextureReady = false, fontsLoaded = false;

const FONT_UPPER = "700 34px 'PlusJakartaSans', sans-serif";
const FONT_TITLE = "400 90px 'DMSerifDisplay', serif";
const FONT_SUBTITLE = "700 34px 'PlusJakartaSans', sans-serif";
const FONT_BODY = "700 54px 'PlusJakartaSans', sans-serif";

const TITLE_PRE_HOLD = 0.5;
const TITLE_WIPE = 1.0;
const TITLE_STATIC = 2.0;
const BODY_FADE_IN = 0.4;
const BODY_WIPE = 0.5;
const HIGHLIGHT_LINE_DUR = 1.0;
const PAGE_GAP = 0.4;
const READING_WORDS_PER_SEC = 3.0;

function setStatus(t) { statusEl.textContent = t; }

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

/* ============================================================
   BACKGROUND - SELALU #00ff00
   ============================================================ */
function fillGreenBackground() {
  ctx.fillStyle = '#00ff00';
  ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
}

function wrapText(text, maxWidth, fontSpec) {
  if (fontSpec) ctx.font = fontSpec;
  const paragraphs = text.split(/\r?\n/);
  const lines = [];
  for (const para of paragraphs) {
    const trimmed = para.trim();
    if (!trimmed) { lines.push(''); continue; }
    const words = trimmed.split(/\s+/);
    let line = words[0];
    for (let i = 1; i < words.length; i++) {
      const word = words[i];
      const testLine = line + ' ' + word;
      if (ctx.measureText(testLine).width > maxWidth) { lines.push(line); line = word; }
      else line = testLine;
    }
    lines.push(line);
  }
  return lines;
}

function tokenizeHighlighted(text) {
  let tokens = [], buf = '', hi = false, i = 0;
  function flush() { if (buf) { tokens.push({ text: buf, highlight: hi }); buf = ''; }}
  while (i < text.length) {
    if (!hi && text.slice(i, i+2) === '[[') { flush(); hi = true; i += 2; }
    else if (hi && text.slice(i, i+2) === ']]') { flush(); hi = false; i += 2; }
    else { buf += text[i++]; if (text[i-1] === ' ') flush(); }
  }
  flush();
  return tokens;
}

function drawLineFromTokens(tokens, x, y, normalColor, highlightBg, progress) {
  if (progress <= 0) {
    ctx.fillStyle = normalColor;
    ctx.fillText(tokens.map(t => t.text).join(''), x, y);
    return;
  }
  if (progress > 1) progress = 1;
  
  const full = tokens.map(t => t.text).join('');
  let first = null, last = null, index = 0;
  
  for (const t of tokens) {
    const len = t.text.length;
    if (t.highlight && t.text.trim().length > 0) {
      if (first === null) first = index;
      last = index + len;
    }
    index += len;
  }

  if (first !== null) {
    const before = full.slice(0, first);
    const inside = full.slice(first, last);
    const wBefore = before ? ctx.measureText(before).width : 0;
    const wInside = ctx.measureText(inside).width;
    const visible = wInside * easeInOutCubic(progress);
    
    ctx.fillStyle = highlightBg;
    ctx.fillRect(x + wBefore - 4, y - 42, visible + 8, 54);
  }

  ctx.fillStyle = normalColor;
  ctx.fillText(full, x, y);
}

function drawWrappedRichParagraph(text, x, yStart, maxWidth, lineGap, normal, highlightBg, indexStart, time) {
  const tokens = tokenizeHighlighted(text);
  let lines = [], curTokens = [], curText = '';
  
  for (const tok of tokens) {
    const test = curText + tok.text;
    if (curText && ctx.measureText(test).width > maxWidth) { lines.push(curTokens); curTokens = [tok]; curText = tok.text; }
    else { curTokens.push(tok); curText = test; }
  }
  if (curTokens.length) lines.push(curTokens);

  let y = yStart, id = indexStart;
  for (const lineTokens of lines) {
    const startT = id * HIGHLIGHT_LINE_DUR;
    const rel = (time - startT) / HIGHLIGHT_LINE_DUR;
    const p = Math.max(0, Math.min(rel, 1));
    drawLineFromTokens(lineTokens, x, y, normal, highlightBg, p);
    y += lineGap;
    id++;
  }
  return { y, linesUsed: lines.length };
}

/* ============================================================
   TITLE - SELALU DARI GREEN BACKGROUND
   ============================================================ */
function rebuildTitleLayout() {
  const marginLeft = 110, marginRight = 140, textWidth = LOGICAL_WIDTH - marginLeft - marginRight;
  const upper = upperEl.value.trim(), title = titleEl.value.trim(), subtitle = subtitleEl.value.trim();
  
  let upperLines = [], titleLines = [], subtitleLines = [];
  if (upper) upperLines = wrapText(upper, textWidth, FONT_UPPER);
  if (title) titleLines = wrapText(title, textWidth, FONT_TITLE);
  if (subtitle) subtitleLines = wrapText(subtitle, textWidth, FONT_SUBTITLE);

  titleLayout = { marginLeft, marginRight, textWidth, upperLines, titleLines, subtitleLines };
  rebuildTitleTexture();
}

function rebuildTitleTexture() {
  titleCanvas = document.createElement('canvas');
  titleCanvas.width = LOGICAL_WIDTH;
  titleCanvas.height = LOGICAL_HEIGHT;
  titleCtx = titleCanvas.getContext('2d');
  
  // ISI BACKGROUND GREEN DI TITLE CANVAS JUGA
  titleCtx.fillStyle = '#00ff00';
  titleCtx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
  
  titleCtx.fillStyle = '#ffffff';
  titleCtx.textAlign = 'left';

  const marginLeft = titleLayout.marginLeft;
  let y = LOGICAL_HEIGHT - 700;

  if (titleLayout.upperLines.length > 0) {
    titleCtx.font = FONT_UPPER;
    for (const line of titleLayout.upperLines) { titleCtx.fillText(line, marginLeft, y); y += 36; }
    y += 70;
  }

  if (titleLayout.titleLines.length > 0) {
    titleCtx.font = FONT_TITLE;
    for (const line of titleLayout.titleLines) { titleCtx.fillText(line, marginLeft, y); y += 90; }
    y -= 20;
  }

  if (titleLayout.subtitleLines.length > 0) {
    titleCtx.font = FONT_SUBTITLE;
    for (const line of titleLayout.subtitleLines) { titleCtx.fillText(line, marginLeft, y); y += 36; }
  }

  titleTextureReady = true;
}

function drawTitleScene(t) {
  const marginLeft = titleLayout.marginLeft, textWidth = titleLayout.textWidth;
  if (!titleTextureReady || !titleCanvas) { fillGreenBackground(); return; }

  // SELALU MULAI DARI GREEN PENUH
  fillGreenBackground();

  if (t < TITLE_PRE_HOLD) { 
    ctx.drawImage(titleCanvas, 0, 0); 
    return; 
  }

  const localT = t - TITLE_PRE_HOLD;
  if (localT < TITLE_WIPE) {
    const raw = Math.max(0, Math.min(1, localT / TITLE_WIPE));
    const p = easeInOutCubic(raw);
    const clipWidth = marginLeft + textWidth * p;
    
    ctx.drawImage(titleCanvas, 0, 0);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(clipWidth, 0, LOGICAL_WIDTH - clipWidth, LOGICAL_HEIGHT);
    return;
  }

  ctx.drawImage(titleCanvas, 0, 0);
}

function fixOrphans(line) {
  return line.replace(/\b(ke|di)\s+(?=\S)/gi, '$1\u00A0')
               .replace(/\b(terima)\s+(kasih)\b/gi, 'terima\u00A0kasih')
               .replace(/\b(Jawa)\s+(Pos)\b/gi, 'Jawa\u00A0Pos');
}

function estimateLinesForParagraph(text, maxWidth) {
  ctx.font = FONT_BODY;
  const tokens = tokenizeHighlighted(text);
  let lines = 0, curTokens = [], curText = '';
  for (const tok of tokens) {
    const test = curText + tok.text;
    if (curText && ctx.measureText(test).width > maxWidth) { lines++; curTokens = [tok]; curText = tok.text; }
    else { curTokens.push(tok); curText = test; }
  }
  if (curTokens.length) lines++;
  return lines || 1;
}

function rebuildBodyPages() {
  const raw = bodyEl.value.split("\n");
  bodyPages = []; let cur = [];
  for (const line of raw) {
    const tr = line.trimEnd();
    if (!tr.trim()) { if (cur.length) { bodyPages.push(cur); cur = []; } }
    else cur.push(fixOrphans(tr));
  }
  if (cur.length) bodyPages.push(cur);
  if (!bodyPages.length) bodyPages = [[]];
}

function drawBodyPage(pageIndex, t) {
  fillGreenBackground();
  const lines = bodyPages[pageIndex] || [];
  const marginLeft = 110, maxWidth = 830;

  let alpha = 1;
  if (t < BODY_FADE_IN) alpha = t / BODY_FADE_IN;
  let wipe = 1;
  if (t < BODY_WIPE) wipe = t / BODY_WIPE;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.rect(0, 0, marginLeft + maxWidth * wipe, LOGICAL_HEIGHT);
  ctx.clip();

  ctx.textAlign = 'left';
  ctx.font = FONT_BODY;

  let totalUnits = 0;
  for (const raw of lines) { if (raw.trim()) totalUnits += estimateLinesForParagraph(raw, maxWidth); }

  const gap = 64, baseY = LOGICAL_HEIGHT - 600;
  let y = totalUnits <= 7 ? baseY : (totalUnits <= 12 ? baseY + (7 - totalUnits) * gap : baseY + (7 - 12) * gap);

  let idx = 0;
  for (const raw of lines) {
    if (!raw.trim()) { y += gap * 0.6; continue; }
    const res = drawWrappedRichParagraph(raw, marginLeft, y, maxWidth, gap, "#fff", "#0088d8", idx, t);
    y = res.y;
    idx += res.linesUsed;
  }
  ctx.restore();
}

function recomputeTargetDuration() {
  rebuildTitleLayout();
  rebuildBodyPages();
  pageDurations = [];
  ctx.font = FONT_BODY;

  for (const page of bodyPages) {
    const joined = page.join(' ').trim();
    const words = joined ? joined.split(/\s+/).length : 0;
    if (!words) { pageDurations.push(3); continue; }

    let totalUnits = 0;
    for (const raw of page) { if (raw.trim()) totalUnits += estimateLinesForParagraph(raw, 830); }
    if (!totalUnits) totalUnits = 1;

    const readingSeconds = words / READING_WORDS_PER_SEC;
    const animMinimum = totalUnits * HIGHLIGHT_LINE_DUR + 0.5;
    let d = Math.max(readingSeconds, animMinimum);
    d = Math.max(3, Math.min(12, d));
    pageDurations.push(d);
  }

  const titleTotal = TITLE_PRE_HOLD + TITLE_WIPE + TITLE_STATIC;
  const contentDurNoGap = pageDurations.reduce((a, b) => a + b, 0);
  targetDuration = titleTotal + 1 + contentDurNoGap + PAGE_GAP * (bodyPages.length - 1);
}

function drawFrame(globalT) {
  const titleTotal = TITLE_PRE_HOLD + TITLE_WIPE + TITLE_STATIC;
  const afterTitleGap = titleTotal + 1;

  if (globalT <= titleTotal) { drawTitleScene(globalT); return; }
  if (globalT <= afterTitleGap) { fillGreenBackground(); return; }

  const tBody = globalT - afterTitleGap;
  let acc = 0;
  for (let i = 0; i < bodyPages.length; i++) {
    const d = pageDurations[i];
    if (tBody < acc + d) { drawBodyPage(i, tBody - acc); return; }
    if (tBody < acc + d + PAGE_GAP) { fillGreenBackground(); return; }
    acc += d + PAGE_GAP;
  }
  drawBodyPage(bodyPages.length - 1, pageDurations[bodyPages.length - 1] || 1);
}

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
let animationId = null;

function animate(ts) {
  if (!animating && !recording) return;
  if (!animStart) animStart = ts;

  const elapsed = (ts - animStart) / 1000;
  drawFrame(Math.min(elapsed, targetDuration));

  if (elapsed < targetDuration) {
    animationId = requestAnimationFrame(animate);
  } else if (!recording) {
    animating = false;
    setStatus("Preview selesai");
  }
}

function stopAnimation() {
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  animating = false;
}

/* ============================================================
   PREVIEW & RENDER
   ============================================================ */
previewBtn.addEventListener("click", () => {
  if (!fontsLoaded) {
    setStatus("Loading fonts...");
    loadFonts().then(() => startPreview());
    return;
  }
  startPreview();
});

function startPreview() {
  stopAnimation();
  recomputeTargetDuration();
  animStart = null;
  animating = true;
  recording = false;
  setStatus("Preview...");
  animationId = requestAnimationFrame(animate);
}

async function loadFonts() {
  if (fontsLoaded) return;
  try {
    if (document.fonts) await document.fonts.ready;
    fontsLoaded = true;
    rebuildTitleLayout();
    drawFrame(0);
    setStatus("Ready");
  } catch (e) {
    fontsLoaded = true;
  }
}

function pickBestRecorder(stream, format) {
  const candidates = format === 'mp4' 
    ? ["video/mp4;codecs=avc1.42E01E", "video/mp4;codecs=avc1.64001E", "video/mp4;codecs=avc1", "video/mp4", ""]
    : ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm", ""];

  for (const mime of candidates) {
    if (mime && !MediaRecorder.isTypeSupported(mime)) continue;
    try {
      const opts = mime ? { mimeType: mime, videoBitsPerSecond: 8000000 } : { videoBitsPerSecond: 8000000 };
      return { recorder: new MediaRecorder(stream, opts), mime };
    } catch (e) { continue; }
  }
  throw new Error("No codec");
}

function startRender(format) {
  if (!fontsLoaded) {
    setStatus("Loading fonts...");
    loadFonts().then(() => doRender(format));
    return;
  }
  doRender(format);
}

function doRender(format) {
  if (!MediaRecorder || !canvas.captureStream) {
    alert("Browser tidak support");
    return;
  }

  stopAnimation();
  recomputeTargetDuration();
  
  const FPS = 60;
  const stream = canvas.captureStream(FPS);
  recordedChunks = [];

  try {
    const res = pickBestRecorder(stream, format);
    mediaRecorder = res.recorder;
    
    mediaRecorder.ondataavailable = (e) => { if (e.data.size) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => finishRender(format, res.mime);
    
    recording = true;
    animating = true;
    animStart = null;
    setStatus(`Rendering ${format.toUpperCase()}...`);
    
    setTimeout(() => {
      if (mediaRecorder) mediaRecorder.start(16);
      animationId = requestAnimationFrame(animate);
    }, 100);
    
    setTimeout(() => {
      if (recording && mediaRecorder?.state === "recording") {
        mediaRecorder.stop();
      }
    }, targetDuration * 1000 + 300);
    
  } catch (err) {
    alert("Error: " + err.message);
    setStatus("Error");
  }
}

function finishRender(format, mime) {
  recording = false;
  if (!recordedChunks.length) {
    setStatus("Tidak ada data");
    return;
  }

  const blobType = format === 'mp4' ? "video/mp4" : "video/webm";
  const ext = format === 'mp4' ? "mp4" : "webm";
  const blob = new Blob(recordedChunks, { type: blobType });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `reels_${format}.${ext}`;
  a.textContent = `Download ${format.toUpperCase()}`;
  a.style.color = format === 'mp4' ? "#fb923c" : "#38bdf8";
  
  downloadEl.appendChild(a);
  setStatus(`${format.toUpperCase()} selesai`);
}

renderBtn.addEventListener("click", () => startRender('webm'));
renderMp4Btn.addEventListener("click", () => startRender('mp4'));

// Init dengan green background
loadFonts().then(() => {
  fillGreenBackground();
  rebuildTitleLayout();
  drawFrame(0);
});
</script>
</body>
</html>
